services:
  - type: web
    name: metalman-backend
    env: python
    rootDir: metalman-auto-engineer/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: OPENAI_API_KEY
        sync: false
